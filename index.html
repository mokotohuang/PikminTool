<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>進階自動排序提醒工具</title>
    <style>
        :root {
            --primary-color: #007bff;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            background-color: var(--bg-color); padding: 20px; margin: 0;
        }
        .container {
            background: white; padding: 2rem; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
            max-width: 450px; width: 100%;
        }
        #clock {
            font-size: 3.5rem; color: var(--primary-color); margin: 10px 0;
            font-weight: bold; font-family: 'Courier New', Courier, monospace;
        }
        
        /* 輸入區排版 */
        .input-group {
            display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 10px;
        }
        .main-input {
            padding: 12px; font-size: 1.2rem; width: 85%; border: 2px solid #ddd;
            border-radius: 10px; outline: none; text-align: center;
        }
        .checkbox-area {
            display: flex; align-items: center; gap: 5px; font-size: 1rem; color: #444; cursor: pointer;
        }
        .checkbox-area input { width: 18px; height: 18px; cursor: pointer; }

        .help-text { font-size: 0.85rem; color: #666; }
        .controls { margin: 20px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; padding: 10px; transition: 0.2s; }
        .btn-clear-all { background-color: var(--danger-color); color: white; flex: 1; min-width: 120px; }
        .btn-clear-expired { background-color: #6c757d; color: white; flex: 1; min-width: 120px; }
        .btn-test { background-color: #f0f0f0; color: #333; flex: 1; min-width: 80px; font-size: 0.8rem; }
        
        ul { list-style: none; padding: 0; margin-top: 10px; width: 100%; display: flex; flex-direction: column; }
        li {
            background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 12px;
            border: 2px solid #eee; display: flex; flex-direction: column; gap: 10px;
            transition: all 0.4s ease;
        }
        .alarm-warning { border-color: var(--warning-color); background-color: #fff9e6; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { border-color: var(--danger-color); background-color: #fff0f0; } }
        .item-expired { background-color: #f0f0f0 !important; border-color: #ddd !important; opacity: 0.6; }
        .item-expired .target-label { color: #888 !important; text-decoration: line-through; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .info { text-align: left; }
        .target-label { font-size: 1.1rem; font-weight: bold; color: #333; display: block; }
        .remind-label { font-size: 0.8rem; color: #d63384; }
        .note-input { width: 100%; padding: 8px; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .delete-btn { background: #adb5bd; color: white; padding: 6px 12px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="clock">00:00:00</div>
    
    <div class="input-group">
        <input type="text" id="timeInput" class="main-input" placeholder="輸入 4 碼 (例如 0500)" maxlength="4" autofocus>
        <label class="checkbox-area">
            <input type="checkbox" id="plusFive" checked> 自動額外加 5 分鐘
        </label>
    </div>

    <div class="help-text">按 <strong>Enter</strong> 預約，清單會自動由近到遠排序</div>
    
    <div class="controls">
        <button class="btn-clear-expired" onclick="clearExpired()">🧹 清理過期項</button>
        <button class="btn-clear-all" onclick="clearAll()">🗑️ 全部清空</button>
        <button class="btn-test" onclick="unlockAndTest()">🔊 測試</button>
    </div>
    
    <ul id="timeList"></ul>
</div>

<script>
    let audioCtx = null;
    let alarms = [];

    function updateClock() {
        const now = new Date();
        const currentTime = now.toTimeString().split(' ')[0];
        document.getElementById('clock').textContent = currentTime;
        checkAlarms(currentTime);
    }
    setInterval(updateClock, 1000);

    function playNote(freq, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function playAlarmSequence() {
        const notes = [523, 659, 783, 1046, 783, 1046];
        notes.forEach((freq, index) => {
            setTimeout(() => playNote(freq, 0.5), index * 200);
        });
    }

    function unlockAndTest() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        playAlarmSequence();
    }

    document.getElementById('timeInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            else if (audioCtx.state === 'suspended') audioCtx.resume();

            const val = this.value;
            if (val.length === 4 && !isNaN(val)) {
                let mins = parseInt(val.substring(0, 2));
                let secs = parseInt(val.substring(2, 4));
                
                // --- 核心邏輯：檢查是否要加 5 分鐘 ---
                if (document.getElementById('plusFive').checked) {
                    mins += 5;
                }

                const targetDate = new Date(Date.now() + (mins * 60 + secs) * 1000);
                const remindDate = new Date(targetDate.getTime() - 60000);
                
                const targetStr = targetDate.toTimeString().split(' ')[0];
                const remindStr = remindDate.toTimeString().split(' ')[0];
                
                addItem(targetStr, remindStr, targetDate.getTime());
                this.value = '';
                playNote(880, 0.1);
            }
        }
    });

    function addItem(targetStr, remindStr, targetTimestamp) {
        const id = Date.now();
        alarms.push({ 
            id, target: targetStr, remind: remindStr, 
            timestamp: targetTimestamp, triggered: false, expired: false 
        });
        renderList();
    }

    function renderList() {
        const listEl = document.getElementById('timeList');
        alarms.sort((a, b) => {
            if (a.expired !== b.expired) return a.expired ? 1 : -1;
            return a.timestamp - b.timestamp;
        });

        const currentNotes = {};
        document.querySelectorAll('.note-input').forEach(input => {
            const id = input.closest('li').id.replace('item-', '');
            currentNotes[id] = input.value;
        });

        listEl.innerHTML = '';
        alarms.forEach(a => {
            const li = document.createElement('li');
            li.id = `item-${a.id}`;
            if (a.expired) li.classList.add('item-expired');
            li.innerHTML = `
                <div class="item-header">
                    <div class="info">
                        <span class="target-label">🎯 目標：${a.target}</span>
                        <span class="remind-label">🔔 提醒：${a.remind}</span>
                    </div>
                    <button class="delete-btn" onclick="removeEntry(${a.id})">移除</button>
                </div>
                <input type="text" class="note-input" placeholder="備註資訊..." value="${currentNotes[a.id] || ""}">
            `;
            listEl.appendChild(li);
        });
    }

    function checkAlarms(nowStr) {
        let needResort = false;
        const nowVal = parseInt(nowStr.replace(/:/g, ''));
        alarms.forEach(a => {
            const el = document.getElementById(`item-${a.id}`);
            if (!el) return;
            if (a.remind === nowStr && !a.triggered) {
                a.triggered = true;
                triggerAlarm(a.id, a.target);
            }
            const targetVal = parseInt(a.target.replace(/:/g, ''));
            if (nowVal >= targetVal && !a.expired) {
                a.expired = true;
                needResort = true;
            }
        });
        if (needResort) renderList();
    }

    function triggerAlarm(id, targetTime) {
        const el = document.getElementById(`item-${id}`);
        if (el) el.classList.add('alarm-warning');
        playAlarmSequence();
        const note = el ? el.querySelector('.note-input').value : "";
        setTimeout(() => {
            alert(`【時間提醒】\n\n即將到達目標時間：${targetTime}${note ? '\n備註：' + note : ""}`);
            if (el && !el.classList.contains('item-expired')) el.classList.remove('alarm-warning');
        }, 1500);
    }

    function removeEntry(id) {
        alarms = alarms.filter(a => a.id !== id);
        renderList();
    }

    function clearExpired() {
        alarms = alarms.filter(a => !a.expired);
        renderList();
    }

    function clearAll() {
        if(confirm("確定要清空所有清單嗎？")) {
            alarms = [];
            renderList();
        }
    }
</script>

</body>
</html>
